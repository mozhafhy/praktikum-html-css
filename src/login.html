<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />

    <title>Sign In</title>
  </head>
  <body>
    <form action="https://example.org/post" method="post">
      <div class="headers">
        <h1 class="headline small">Sign In</h1>
      </div>

      <div class="input-wrapper">
        <div class="container email-input">
          <label class="label large" for="email">Email</label>
          <div class="input-field">
            <input
              class="body small"
              type="email"
              name="email"
              id="email"
              placeholder="Enter your email"
              required
            />
            <i class="material-icons-outlined">email</i>
          </div>
        </div>

        <div class="container password-input">
          <div class="container">
            <label class="label large" for="password">Password</label>
            <div class="input-field">
              <input
                class="body small"
                type="password"
                name="password"
                id="password"
                placeholder="Enter your password"
                required
              />
              <i class="material-icons-outlined">visibility</i>
            </div>
            <label class="body small forgot" for="password">
              <a href="">Forgot password?</a>
            </label>
          </div>
        </div>

        <div class="container signin">
          <button type="submit" class="label large submit" name="submit">
            Sign In
          </button>
          <label class="body small" for="submit">
            No membership?
            <a id="signup-now" href="signup.html">Sign up now!</a>
          </label>
        </div>

      </div>
      
    </form>
  
  </body>
</html>
